<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>情報修正・閉店報告フォーム</title>
  <link rel="stylesheet" href="style.css?v=6253471">
  <style>
    .report-page {
      max-width: 760px;
      margin: 28px auto;
      padding: 0 16px 32px;
    }

    .report-card {
      background: #ffffff;
      border: 1px solid #e2e2e2;
      border-radius: 8px;
      padding: 18px 16px;
    }

    .report-page h1 {
      margin: 0 0 10px;
      font-size: 1.35rem;
      border-left: 5px solid #222222;
      background: #f2d300;
      padding: 10px 14px;
    }

    .report-page p {
      margin: 0 0 12px;
    }

    .report-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .report-field {
      margin-bottom: 12px;
    }

    .report-field label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.86rem;
      font-weight: 700;
      color: #444444;
    }

    .report-field input,
    .report-field select,
    .report-field textarea {
      width: 100%;
      border: 1px solid #d6d6d6;
      border-radius: 6px;
      background-color: #ffffff;
      padding: 10px 12px;
      font-size: 0.9rem;
      font-family: inherit;
    }

    .report-field textarea {
      resize: vertical;
    }

    .report-submit {
      border: 0;
      border-radius: 999px;
      background-color: #f2d300;
      color: #222222;
      font-weight: 700;
      padding: 10px 18px;
      cursor: pointer;
    }

    .back-link {
      display: inline-block;
      margin-top: 14px;
      color: #0b57d0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    @media screen and (max-width: 640px) {
      .report-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="report-page">
    <div class="report-card">
      <h1>情報修正・閉店報告フォーム</h1>
      <p>店舗情報に誤りがある場合や、閉店・移転などを確認された場合は、下記よりご報告ください。</p>

      <form action="#" method="post">
        <div class="report-grid">
          <div class="report-field">
            <label for="store-name">店舗名</label>
            <input id="store-name" name="storeName" type="text" placeholder="例）テキスト">
          </div>

          <div class="report-field">
            <label for="report-type">ご報告内容</label>
            <select id="report-type" name="reportType">
              <option value="">選択してください</option>
              <option>情報が間違っている</option>
              <option>閉店している</option>
              <option>移転している</option>
              <option>その他</option>
            </select>
          </div>
        </div>

        <div class="report-field">
          <label for="report-url">対象ページURL（任意）</label>
          <input id="report-url" name="targetUrl" type="url" placeholder="https://">
        </div>

        <div class="report-field">
          <label for="report-detail">詳細内容</label>
          <textarea id="report-detail" name="detail" rows="5" placeholder="確認した内容を入力してください"></textarea>
        </div>

        <div class="report-field">
          <label for="report-email">ご連絡先メール（任意）</label>
          <input id="report-email" name="email" type="email" placeholder="example@example.com">
        </div>

        <button class="report-submit" type="submit">送信する</button>
      </form>

      <a class="back-link" href="index.html">コラムページへ戻る</a>
    </div>
  </main>
</body>
</html>
